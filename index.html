<!DOCTYPE html>
<html> lang="en">

<head>
    <meta charset="UTF-8">
    <title>Welcome to Jaz's market</title>
    <link rel="stylesheet" href="style.css">
</head>


<body>

    <h1>welcome to Jaz's market</h1>
    <p>This is a simple online store</p>
    <script src="script.js"></script>

    <h2>Calculator</h2>

    <input type="number" id="num1" placeholder="Number 1">
    <input type="number" id="num2" placeholder="Number 2">



    <button onclick="add()">Add</button>
    <button onclick="subtract()">Subtract</button>
    <button onclick="multiply()">Multiply</button>
    <button onclick="divide()">Divide</button>
    <button onclick="square()">Square (x²)</button>
    <button onclick="sqrt()">Square Root (√)</button>
    <button onclick="percent()">Percent (%)</button>
    <button onclick="Backspace()">Backspace</button>
    <p id="result">Result: </p>
    <div class="form">
        <input type="text" id="name" placeholder="Product Name">

        <input type="number" id="price" placeholder="Price">

        <input type="file" id="image">
    </div>
    <script src="script.js"></script>
</body>

</html>
